services:
  - type: web
    name: ledgerflow-expense-tracker
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SERVE_FRONTEND
        value: true
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
